- defaults:
    link:
      create: true
      relink: true

- clean: ["~"]

- shell:
    - command: mkdir -p "$HOME/Documents/Raycast Scripts"
      description: Ensure Raycast scripts target exists
    - command: git config --global core.excludesfile "$HOME/.config/git/ignore"
      description: Set global gitignore path
      stdout: true
      stderr: true

- link:
    ~/.zshrc: config/zsh/.zshrc
    ~/.config/eza: config/eza/.config/eza
    ~/.config/fastfetch: config/fastfetch/.config/fastfetch
    ~/.config/ghostty: config/ghostty/.config/ghostty
    ~/.config/starship.toml: config/starship/.config/starship.toml
    ~/.config/zed: config/zed/.config/zed
    ~/Library/Application Support/Code/User/profiles/default.code-profile: config/vscode/default.code-profile
    ~/Library/Application Support/Code/User/settings.json: config/vscode/.config/Code/User/settings.json
    ~/Documents/Raycast Scripts: config/raycast
    ~/.gitconfig: config/git/.gitconfig
    ~/.config/git/ignore: config/git/.config/git/ignore

- duti:
    file: Dutifile
