# ===========================================
# Codex config.toml
# ===========================================

# Default model
model = "gpt-5.1-codex-max"
model_reasoning_effort = "medium"

# -------------------------------------------
# Notices / migration prompts
# -------------------------------------------
[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 20.0
tool_timeout_sec = 60.0

[mcp_servers.context7.env]
CONTEXT7_API_KEY = "${env:CONTEXT7_API_KEY}"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_PERSONAL_ACCESS_TOKEN"

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]
startup_timeout_sec = 20.0
tool_timeout_sec = 60.0

[mcp_servers.vercel]
command = "npx"
args = ["mcp-remote", "https://mcp.vercel.com"]
startup_timeout_sec = 20.0
tool_timeout_sec = 60.0

# ===========================================
# Trusted Projects
# ===========================================
[projects]

[projects."/Users/jstn"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/FMMLoader-26"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/FMMLoader-Docs"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/fmmloader-docs"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/modloader-docs"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/docs-template"]
trust_level = "trusted"

[projects."/Users/jstn/Downloads/ui-main"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/tauri-plugin-macos-permissions"]
trust_level = "trusted"

[projects."/Users/jstn/Documents/GitHub/flagsrc-colors"]
trust_level = "trusted"
